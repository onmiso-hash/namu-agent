id: 01KW397QE2Q0HSM39GB10TQAJV
machine: samsung
outcome: success
reason: rebuild가 db 파일을 unlink→재생성하는 방식은 윈도우에서 깨진다. with sqlite3.connect는 commit만
  하고 close를 안 해 열린 핸들이 남고, 리눅스는 열린 파일 unlink를 허용하나 윈도우는 WinError 32로 거부. 해결=unlink
  제거하고 단일 conn 안에서 DROP TABLE 후 _SCHEMA 재생성 + contextlib.closing으로 conn 확실히 닫기. 두
  번째 PC(삼성) 검증에서만 발견됨.
