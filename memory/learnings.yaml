  — 오케스트레이터가 "6장(저장 위치 설명부)"라고 틀리게 지시했는데, 코더가 기존 문서의 "(6장 참고)" 교차참조가 실제로 성립하는 위치(6장=로드맵)를
  근거로 배치를 판단하고 사유를 보고했다. 지시서 맹종보다 "기존 문서의 참조 정합"이 상위 기준이며, 이탈은 근거+보고가 붙으면 가치다(namu-26
  "문서가 코드를 재서술하면 어긋난다"의 문서판: 지시서도 실물과 어긋날 수 있다).'
