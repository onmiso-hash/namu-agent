  의심 목록에 올려두고 라이브 실측을 정조준한 것이 적발의 핵심(namu-23·26·27·29 "라이브만이 실환경 결함을 잡는다" 계보, 이번엔
  ''어디를 조준할지''까지 사전 설계). ② 해법 격리: --allow-unrelated-histories는 setup(1회성 온보딩)에만 허용하고
  평상 sync_pull/push에는 금지 — 평상 운영에서 unrelated가 나타나면 진짜 사고라서 무음 병합하면 은폐가 된다. 위험한 플래그는
  그것이 정당한 유일한 시점에 가둬라. ③ "ULID라 머지 충돌 0"은 논리 충돌 얘기고 git 텍스트 병합은 별개다 — 두 PC가 같은 파일
  EOF에 append하면 텍스트 충돌이 난다. append-only 파일의 멀티 PC git 동기화는 .gitattributes merge=union(순서
  무관, ULID가 시간순 보장)이 정답. ④ 자동 동기화 발동 조건은 "git 저장소 존재"가 아니라 명시적 활성화(마커)+하드가드(NAMU_HOME≠REPO_ROOT)여야
